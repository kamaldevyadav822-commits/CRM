<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
<title>Login</title>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-6 rounded-xl shadow w-full max-w-sm">

<h2 class="text-xl font-semibold mb-4 text-center">CRM Login</h2>

<input id="email" placeholder="Email" class="w-full p-3 border rounded mb-3">
<input id="password" type="password" placeholder="Password" class="w-full p-3 border rounded mb-4">

<button onclick="login()" class="w-full bg-blue-500 text-white p-3 rounded">
Login
</button>

<p id="error" class="text-red-500 text-sm mt-2 text-center"></p>

</div>

<script type="module">

import { auth, signInWithEmailAndPassword } from "./firebase.js";

window.login = async function(){

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try{
    await signInWithEmailAndPassword(auth, email, password);
    window.location.href = "app.html";
  }catch(err){
    document.getElementById("error").innerText = err.message;
  }

}

</script>

</body>
</html>
